<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="KittyTasks - Tu app de productividad con un gatito animado. Gestiona tareas, proyectos y notas con sincronización en la nube." />
  <title>KittyTasks 🐱</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#7c6ff7" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap"
    rel="stylesheet" />

  <!-- Global Styles -->
  <link rel="stylesheet" href="/src/styles/variables.css" />
  <link rel="stylesheet" href="/src/styles/global.css" />
  <link rel="stylesheet" href="/src/styles/animations.css" />

  <!-- EmailJS SDK (for friend invitation emails) -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script type="text/javascript">
    // Initialize EmailJS — replace with your actual Public Key from emailjs.com
    (function () {
      if (typeof emailjs !== 'undefined') {
        emailjs.init('YOUR_EMAILJS_PUBLIC_KEY');
      }
    })();
  </script>

</head>

<body>
  <div id="app"></div>
  <!-- Main App Entry -->
  <script type="module" src="/src/main.js"></script>
</body>

</html>
